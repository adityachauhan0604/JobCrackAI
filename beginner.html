<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beginner - Unlimited Practice - JobCrackAI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <style>
        /* Same complete styles as before */
        :root { --level-color: #4CAF50; }
        /* ... all previous styles ... */
        .job-tabs {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap;
        }
        .job-tab {
            padding: 12px 24px; border: 2px solid #e0e0e0; background: white;
            border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .job-tab.active { background: var(--level-color); color: white; border-color: var(--level-color); }
        .question-counter {
            background: rgba(255,255,255,0.9); padding: 15px; border-radius: 20px;
            text-align: center; margin-bottom: 20px; font-weight: 700;
        }
        .unlimited-badge {
            background: linear-gradient(45deg, #FF6B6B, #FF8E8E); color: white;
            padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 700;
            display: inline-block; margin-left: 10px;
        }
    </style>
</head>
<body>
    <button class="btn-back" onclick="goHome()">🏠 Home</button>
    
    <div class="container" style="max-width: 500px; margin: 0 auto; padding: 20px;">
        <div class="header" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 20px; border-radius: 25px; margin-bottom: 25px; text-align: center;">
            <h1 style="color: var(--level-color); font-size: 2em; font-weight: 800;">🆕 Beginner Level</h1>
            <div style="font-size: 1.1em; color: #666; margin-bottom: 10px;">
                Unlimited Questions <span class="unlimited-badge">∞</span>
            </div>
            <div id="confidenceBadge" style="background: linear-gradient(45deg, var(--level-color), #45a049); color: white; padding: 12px 24px; border-radius: 30px; font-weight: 700; display: inline-block;">78%</div>
        </div>

        <!-- Job Category Tabs -->
        <div class="job-tabs">
            <div class="job-tab active" data-job="driver">🚗 Driver</div>
            <div class="job-tab" data-job="factory">🏭 Factory</div>
            <div class="job-tab" data-job="security">🛡️ Security</div>
        </div>

        <!-- Question Counter -->
        <div class="question-counter">
            <div>Question <span id="questionNum">1</span> of ∞</div>
            <div style="font-size: 14px; color: #999;">Practice unlimited times!</div>
        </div>

        <!-- Video + Question + All previous elements (same as before) -->
        <div class="video-container">
            <video id="userVideo" autoplay muted playsinline style="display: none;"></video>
            <div class="ai-avatar" id="aiInterviewer">🤵 AI</div>
        </div>

        <div class="question-card" id="questionCard">
            <div class="question-text" id="liveQuestion">Job select karo aur START dabao!</div>
            <div class="timer" id="timer">⏱️ Ready</div>
        </div>

        <!-- All buttons, metrics, feedback (same as before) -->
        <div class="btn-grid">
            <button class="btn btn-primary" id="startBtn" onclick="startInterview()">🎥 START VIDEO</button>
            <button class="btn btn-secondary" onclick="toggleCamera()">📷 Camera</button>
        </div>

        <!-- Metrics Grid (same) -->
        <div class="metrics-grid" id="metricsGrid" style="display: none;">
            <!-- Same 4 metric cards -->
        </div>

        <div class="feedback" id="feedback">
            <!-- Same feedback structure -->
            <button class="btn btn-primary" onclick="nextQuestion()" style="width: 100%; margin-top: 20px;">
                ➡️ Next Random Question (∞ Practice)
            </button>
        </div>
    </div>

    <script>
        // UNLIMITED QUESTION GENERATOR
        const QUESTION_TEMPLATES = {
            beginner: {
                driver: [
                    "Apka naam aur experience introduce karo",
                    "Daily vehicle check process",
                    "3 main safety rules",
                    "Late reporting procedure",
                    "Customer handling basics",
                    "Traffic rules knowledge",
                    "Fuel saving tips",
                    "Emergency contact numbers",
                    "Shift handover process",
                    "Personal hygiene importance"
                ],
                factory: [
                    "Shift start routine",
                    "Machine basic operation",
                    "Safety gear usage",
                    "Quality check process",
                    "Supervisor reporting",
                    "Team coordination",
                    "Break time rules",
                    "Waste disposal",
                    "Attendance marking",
                    "Tool maintenance"
                ],
                security: [
                    "Patrolling route",
                    "ID verification process",
                    "Visitor entry log",
                    "Shift handover",
                    "Gate pass system",
                    "Uniform maintenance",
                    "Radio communication",
                    "Emergency whistle",
                    "Torchlight usage",
                    "Report writing"
                ]
            }
            // Add intermediate & expert in their files
        };

        let currentJob = 'driver';
        let questionCount = 0;
        let stream, model, isAnalyzing = false, timer = 45;

        // Job Tab Switching
        document.querySelectorAll('.job-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelector('.job-tab.active').classList.remove('active');
                e.target.classList.add('active');
                currentJob = e.target.dataset.job;
                if (document.getElementById('liveQuestion')) {
                    generateNewQuestion();
                }
            });
        });

        // Generate TRULY Unlimited Questions
        function generateNewQuestion() {
            questionCount++;
            const templates = QUESTION_TEMPLATES.beginner[currentJob];
            const randomTemplate = templates[Math.floor(Math.random() * templates.length)];
            
            // Dynamic question generation
            const questionTypes = [
                `🎯 "${randomTemplate}" ke baare mein 45 seconds mein explain karo`,
                `💼 Interview question: "${randomTemplate}"? Abhi jawab do!`,
                `🧠 Practical: "${randomTemplate}" situation mein kya karoge?`,
                `👨‍💼 HR poochhe: "${randomTemplate}". Confident jawab!`
            ];
            
            const question = questionTypes[Math.floor(Math.random() * questionTypes.length)];
            document.getElementById('liveQuestion').textContent = question;
            document.getElementById('questionNum').textContent = questionCount;
            document.getElementById('aiInterviewer').textContent = '🤵 AI Interviewer';
        }

        // All other functions same as before (startInterview, analyzeFace, etc.)
        // Just replace showQuestion() with generateNewQuestion()

        function showQuestion() {
            generateNewQuestion();
        }

        async function init() {
            model = await faceLandmarksDetection.load(
                faceLandmarksDetection.SupportedPackages.mediapipeFacemesh
            );
            loadStats();
        }

        function nextQuestion() {
            // Unlimited - always generate new
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('metricsGrid').style.display = 'grid';
            generateNewQuestion();
            startTimer();
            isAnalyzing = true;
        }

        function loadStats() {
            const stats = JSON.parse(localStorage.getItem('beginner_stats') || '{}');
            questionCount = stats.questions || 0;
            document.getElementById('questionNum').textContent = questionCount + 1;
        }

        function saveStats() {
            const stats = JSON.parse(localStorage.getItem('beginner_stats') || '{}');
            stats.questions = questionCount;
            stats.lastPracticed = new Date().toISOString();
            localStorage.setItem('beginner_stats', JSON.stringify(stats));
        }

        // Auto-save every question
        window.addEventListener('beforeunload', saveStats);

        init();
    </script>
</body>
</html>
