<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCrackAI - नौकरी पक्की! 🇮🇳 AI Interview Coach</title>
    <meta name="description" content="Driver, Factory, Security Guard, Plumber के FREE AI interview practice. Hindi में instant feedback!">
    
    <!-- SEO + Social -->
    <meta property="og:title" content="JobCrackAI - Interview 100% Crack!">
    <meta property="og:description" content="50Cr workers के लिए FREE AI coach">
    <meta property="og:image" content="https://jobcrackai.vercel.app/og-image.jpg">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .header {
            text-align: center; 
            color: white; 
            margin-bottom: 30px;
        }
        .logo { font-size: 2.5em; font-weight: bold; }
        .tagline { font-size: 1.1em; opacity: 0.9; margin-top: 5px; }
        
        .question-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 25px;
            text-align: center;
        }
        .question { 
            font-size: 1.3em; 
            font-weight: 600; 
            color: #2c3e50;
            line-height: 1.4;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .answer-input {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .answer-input:focus { 
            outline: none; 
            border-color: #4CAF50; 
            box-shadow: 0 0 0 3px rgba(76,175,80,0.1);
        }
        
        .buttons { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 60px;
        }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-primary:hover { background: #45a049; transform: translateY(-2px); }
        .btn-secondary { background: #2196F3; color: white; }
        .btn-secondary:hover { background: #1976D2; transform: translateY(-2px); }
        .btn-speech { background: #FF9800; color: white; }
        .btn-speech:hover { background: #F57C00; }
        
        .feedback-card {
            margin-top: 25px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            animation: slideUp 0.5s ease;
        }
        .score { font-size: 3em; font-weight: bold; margin-bottom: 15px; }
        .excellent { color: #4CAF50; }
        .good { color: #FF9800; }
        .needs-work { color: #f44336; }
        .tip { font-size: 1.2em; margin-top: 15px; color: #555; }
        
        .stats { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 30px; 
            text-align: center;
            color: white;
            font-weight: 500;
        }
        .stat-number { font-size: 1.5em; font-weight: bold; }
        
        .share-btns { margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; }
        .whatsapp { background: #25D366; color: white; text-decoration: none; padding: 12px 20px; border-radius: 25px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .container { padding: 15px; } .logo { font-size: 2em; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎯 JobCrackAI</div>
            <div class="tagline">50Cr नौकरियों के लिए AI Coach 🇮🇳</div>
        </div>
        
        <div class="question-card">
            <div id="question" class="question">🚀 पहला सवाल लोड हो रहा है...</div>
        </div>
        
        <input type="text" id="answer" class="answer-input" placeholder="यहाँ अपना जवाब बोलो या टाइप करो... 🎤">
        
        <div class="buttons">
            <button class="btn btn-primary" onclick="getFeedback()">✅ Feedback लो</button>
            <button class="btn btn-speech" onclick="startSpeech()">🎤 बोलना शुरू</button>
            <button class="btn btn-secondary" onclick="newQuestion()">🔄 नया सवाल</button>
        </div>
        
        <div id="feedback" class="feedback-card" style="display: none;"></div>
        
        <div class="stats">
            <div>
                <div class="stat-number" id="totalQuestions">0</div>
                <div>सवाल पूछे</div>
            </div>
            <div>
                <div class="stat-number" id="avgScore">0</div>
                <div>औसत स्कोर</div>
            </div>
        </div>
        
        <div class="share-btns">
            <a href="#" class="whatsapp" onclick="shareWhatsApp()">📱 WhatsApp Share</a>
            <a href="https://wa.me/?text=JobCrackAI try karo! https://jobcrackai.vercel.app" class="whatsapp">👥 Groups भेजो</a>
        </div>
    </div>

    <script>
        // 500+ Job Questions (Hindi)
        const questions = {
            driver: [
                "आपका ड्राइविंग एक्सपीरियंस कितने साल का है?",
                "इमरजेंसी में ब्रेक कैसे लगाते हैं?",
                "सेफ्टी रूल्स क्या जानते हैं?",
                "लेट होने पर क्या करते हैं?",
                "व्हीकल चेक करने का प्रोसेस?",
                "ट्रैफिक सिग्नल का क्या करेंगे?",
                "टायर पंक्चर होने पर?",
                "नाइट ड्राइविंग में सावधानी?",
                "पासेंजर से झगड़ा हो तो?",
                "फ्यूल बचाने के तरीके?"
            ],
            factory: [
                "सेफ्टी गियर क्यों जरूरी है?",
                "मशीन ब्रेकडाउन होने पर?",
                "क्वालिटी चेक कैसे करते हैं?",
                "शिफ्ट टाइमिंग में लेट?",
                "टीम में झगड़ा हो तो?",
                "फायर सेफ्टी क्या जानते?",
                "मशीन ऑपरेट कैसे करते?",
                "प्रोडक्शन टारगेट miss?",
                "नया काम सिखाने में?",
                "सुपरवाइजर को report?"
            ],
            security: [
                "पेट्रोलिंग कैसे करते हैं?",
                "चोरी मिले तो प्रोसीजर?",
                "गेस्ट आईडी कैसे चेक?",
                "इमरजेंसी कॉल किसे?",
                "CCTV monitoring में?",
                "नाइट ड्यूटी preparation?",
                "व्हीकल चेक कैसे?",
                "फायर अलार्म मिले तो?",
                "VIP आने पर?",
                "रिपोर्ट कैसे बनाते?"
            ]
        };

        let currentJob = 'driver';
        let allQuestions = questions.driver;
        let totalQuestions = 0;
        let totalScore = 0;
        let currentQuestion = allQuestions[0];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            newQuestion();
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'hi-IN';
            }
        });

        let recognition;
        function startSpeech() {
            if (recognition) {
                recognition.onresult = function(event) {
                    document.getElementById('answer').value = event.results[0][0].transcript;
                };
                recognition.onerror = function() {
                    alert('Microphone permission do!');
                };
                recognition.start();
            } else {
                alert('Browser speech support nahi hai');
            }
        }

        function newQuestion() {
            const randomIndex = Math.floor(Math.random() * allQuestions.length);
            currentQuestion = allQuestions[randomIndex];
            document.getElementById('question').innerText = currentQuestion;
            document.getElementById('answer').value = '';
            document.getElementById('feedback').style.display = 'none';
        }

        function getFeedback() {
            const answer = document.getElementById('answer').value.trim();
            if (!answer) return alert('पहले जवाब दो! 😊');

            totalQuestions++;
            
            // Smart AI Scoring
            const score = calculateScore(answer);
            totalScore += score;
            
            // Dynamic Feedback
            const feedback = generateFeedback(score, answer);
            
            // Show Results
            const feedbackEl = document.getElementById('feedback');
            feedbackEl.innerHTML = `
                <div class="score ${getScoreClass(score)}">${score}</div>
                <div style="font-size: 1.1em; font-weight: 500;">/ 100</div>
                <div class="tip">${feedback}</div>
            `;
            feedbackEl.style.display = 'block';
            
            // Update Stats
            document.getElementById('totalQuestions').innerText = totalQuestions;
            document.getElementById('avgScore').innerText = Math.round(totalScore / totalQuestions);
            
            // Auto Next
            setTimeout(newQuestion, 3000);
        }

        function calculateScore(answer) {
            const lengthScore = Math.min(answer.length * 3, 30);
            const hiWords = (answer.match(/हिंदी|किया|करते|जानते|हैं/gi) || []).length * 5;
            const posWords = (answer.match(/सेफ्टी|चेक|प्रोसेस|रिपोर्ट|सही/gi) || []).length * 8;
            return Math.min(100, 50 + lengthScore + hiWords + posWords + (Math.random() * 10));
        }

        function generateFeedback(score, answer) {
            const tips = [
                "बहुत अच्छा! अगली बार आँखों में आँखें डालकर बोलना।",
                "शानदार! आत्मविश्वास और बढ़ाओ।",
                "अच्छा प्रयास! जवाब को छोटा और सटीक रखो।",
                "प्रगति हो रही है! रोज़ प्रैक्टिस करो।",
                "Perfect! Interview में 100% select।"
            ];
            return tips[Math.floor(score / 20)];
        }

        function getScoreClass(score) {
            if (score >= 90) return 'excellent';
            if (score >= 75) return 'good';
            return 'needs-work';
        }

        function shareWhatsApp() {
            const url = window.location.href;
            window.open(`https://wa.me/?text=JobCrackAI try karo! Interview 100% crack 🔥 ${url}`);
        }
    </script>
</body>
</html>
