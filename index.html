<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCrackAI - Beginner Interview Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.2); 
        }
        .premium-badge {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            box-shadow: 0 4px 14px rgba(255,215,0,0.4);
        }
        @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        .float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 min-h-screen p-4 text-white">

    <div class="max-w-2xl mx-auto space-y-8">
        
        <!-- Premium Header -->
        <div class="glass p-8 rounded-3xl text-center shadow-2xl float">
            <div class="premium-badge px-6 py-3 rounded-2xl inline-block font-bold text-black mb-6 shadow-lg">
                ⭐ PREMIUM UNLOCKED ⭐
            </div>
            <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-r from-white to-blue-300 bg-clip-text text-transparent mb-4">
                JobCrackAI
            </h1>
            <div class="text-2xl font-semibold text-blue-200 mb-6">Beginner Level Practice</div>
            
            <!-- Level Navigation -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="intermediate.html" class="glass px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all text-center">
                    ⚡ Intermediate Level
                </a>
                <a href="expert.html" class="glass px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all text-center">
                    👑 Expert Level
                </a>
            </div>
        </div>

        <!-- Video Interview Section -->
        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div class="flex gap-4 mb-6">
                <button onclick="selectJob('driver')" class="job-btn flex-1 py-4 px-6 rounded-2xl font-bold transition-all ${currentJob === 'driver' ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg' : 'glass hover:scale-105'}">
                    🚗 Driver
                </button>
                <button onclick="selectJob('factory')" class="job-btn flex-1 py-4 px-6 rounded-2xl font-bold transition-all ${currentJob === 'factory' ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg' : 'glass hover:scale-105'}">
                    🏭 Factory
                </button>
                <button onclick="selectJob('security')" class="job-btn flex-1 py-4 px-6 rounded-2xl font-bold transition-all ${currentJob === 'security' ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg' : 'glass hover:scale-105'}">
                    🛡️ Security
                </button>
            </div>

            <!-- Video + Question -->
            <video id="userVideo" autoplay muted playsinline class="w-full h-72 md:h-96 rounded-3xl object-cover shadow-2xl mb-6 hidden"></video>
            
            <div id="currentQuestion" class="bg-gradient-to-r from-purple-500/20 to-pink-500/20 border-4 border-purple-400/50 p-8 rounded-3xl text-center shadow-2xl mb-8 min-h-[160px] flex flex-col justify-center">
                <div class="text-3xl font-black text-white mb-4">👈 Select Job Type</div>
                <div class="text-xl text-blue-300">Click START to begin interview!</div>
            </div>

            <!-- Controls -->
            <div class="flex gap-4 mb-6">
                <button onclick="startVideo()" id="startBtn" class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 text-white py-5 px-8 rounded-3xl font-black text-xl shadow-2xl hover:scale-105 transition-all">
                    🎥 START VIDEO CALL
                </button>
                <button onclick="nextQuestion()" class="glass p-5 rounded-3xl text-3xl font-bold shadow-xl hover:scale-110 transition-all">
                    ❓ NEXT
                </button>
            </div>
        </div>

        <!-- Live Metrics -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass p-8 rounded-3xl text-center shadow-xl hover:scale-105 transition-all">
                <div id="eyeContact" class="text-4xl font-black text-green-400 mb-2">85%</div>
                <div class="text-blue-200 font-semibold">Eye Contact</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center shadow-xl hover:scale-105 transition-all">
                <div id="confidence" class="text-4xl font-black text-blue-400 mb-2">78%</div>
                <div class="text-blue-200 font-semibold">Confidence</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center shadow-xl hover:scale-105 transition-all">
                <div id="speech" class="text-4xl font-black text-yellow-400 mb-2">72%</div>
                <div class="text-blue-200 font-semibold">Speech Clarity</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center shadow-xl hover:scale-105 transition-all">
                <div id="posture" class="text-4xl font-black text-purple-400 mb-2">81%</div>
                <div class="text-blue-200 font-semibold">Posture</div>
            </div>
        </div>

        <!-- Question History -->
        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-gradient-to-r from-yellow-400 to-orange-400 rounded-2xl flex items-center justify-center text-2xl font-bold">📜</div>
                <div>
                    <h3 class="text-2xl font-bold">Question History</h3>
                    <div class="text-blue-300">Q<span id="questionCount">0</span></div>
                </div>
            </div>
            <div id="historyList" class="space-y-3 max-h-64 overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script>
        // Global Variables
        let videoStream = null;
        let currentJob = 'driver';
        let questionCount = 0;
        let analysisInterval;

        // BEGINNER LEVEL QUESTIONS
        const BEGINNER_QUESTIONS = {
            driver: [
                '"Tell me about your driving experience?"',
                '"What are the basic road safety rules?"',
                '"What is your daily vehicle checklist?"',
                '"How do you handle heavy traffic?"',
                '"Why should we hire you as a driver?"',
                '"What documents do you have for driving?"',
                '"How do you maintain vehicle cleanliness?"'
            ],
            factory: [
                '"What shifts are you available for?"',
                '"What are basic machine safety rules?"',
                '"How do you check product quality?"',
                '"What if you miss your daily target?"',
                '"Tell me about your teamwork experience?"',
                '"How do you handle repetitive work?"',
                '"What safety gear do you use?"'
            ],
            security: [
                '"How do you perform patrol duty?"',
                '"What is the ID checking procedure?"',
                '"How do you handle visitors?"',
                '"What if you see suspicious activity?"',
                '"What is your emergency response?"',
                '"How do you report incidents?"',
                '"What security equipment do you use?"'
            ]
        };

        // Job Selection
        function selectJob(job) {
            currentJob = job;
            document.querySelectorAll('.job-btn').forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-blue-500', 'to-blue-600', 'text-white', 'shadow-lg');
                btn.classList.add('glass', 'hover:scale-105');
            });
            event.target.classList.remove('glass', 'hover:scale-105');
            event.target.classList.add('bg-gradient-to-r', 'from-blue-500', 'to-blue-600', 'text-white', 'shadow-lg');
        }

        // Start Video Call
        async function startVideo() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' },
                    audio: true
                });
                
                const video = document.getElementById('userVideo');
                video.srcObject = videoStream;
                video.classList.remove('hidden');
                video.play();
                
                document.getElementById('startBtn').textContent = '🔴 STOP VIDEO';
                document.getElementById('startBtn').classList.replace('from-emerald-500', 'from-red-500');
                document.getElementById('startBtn').classList.replace('to-teal-600', 'to-pink-500');
                
                nextQuestion();
                startLiveAnalysis();
            } catch(err) {
                alert('Please allow Camera & Microphone access!');
            }
        }

        // Next Question
        function nextQuestion() {
            questionCount++;
            document.getElementById('questionCount').textContent = questionCount;
            
            const questions = BEGINNER_QUESTIONS[currentJob];
            const randomQuestion = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('currentQuestion').innerHTML = `
                <div class="text-3xl font-black text-white mb-6">Q${questionCount}</div>
                <div class="text-2xl bg-white/20 p-6 rounded-2xl backdrop-blur-sm">${randomQuestion}</div>
            `;
            
            addToHistory(randomQuestion);
        }

        // Add to History
        function addToHistory(question) {
            const history = document.getElementById('historyList');
            const div = document.createElement('div');
            div.className = 'p-4 bg-white/10 rounded-2xl backdrop-blur-sm hover:bg-white/20 transition-all';
            div.innerHTML = `<strong>Q${questionCount}:</strong> ${question}`;
            history.insertBefore(div, history.firstChild);
        }

        // Live Analysis (Fake AI)
        function startLiveAnalysis() {
            const metrics = {
                eyeContact: 85,
                confidence: 78,
                speech: 72,
                posture: 81
            };

            analysisInterval = setInterval(() => {
                Object.keys(metrics).forEach(key => {
                    const change = (Math.random() - 0.5) * 15;
                    metrics[key] = Math.max(40, Math.round(metrics[key] + change));
                    document.getElementById(key).textContent = metrics[key] + '%';
                });
            }, 2500);
        }

        // Stop Video (Double click start button)
        document.getElementById('startBtn').addEventListener('dblclick', () => {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                document.getElementById('userVideo').classList.add('hidden');
                document.getElementById('startBtn').textContent = '🎥 START VIDEO CALL';
                document.getElementById('startBtn').classList.replace('from-red-500', 'from-emerald-500');
                document.getElementById('startBtn').classList.replace('to-pink-500', 'to-teal-600');
                
                if (analysisInterval) clearInterval(analysisInterval);
            }
        });
    </script>
</body>
</html>
