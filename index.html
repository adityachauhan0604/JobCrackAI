<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCrackAI - Crack Any Interview! 🇮🇳</title>
    <meta name="description" content="AI Interview Coach for Driver, Factory, Security Jobs. Instant Feedback + Confidence Score!">
    
    <!-- PWA -->
    <link rel="manifest" href="data:application/manifest+json,{
        'name': 'JobCrackAI',
        'short_name': 'JobCrackAI',
        'start_url': '/',
        'display': 'standalone',
        'background_color': '#667eea',
        'theme_color': '#4CAF50',
        'icons': [{'src': 'data:image/svg+xml;base64,...', 'sizes': '192x192', 'type': 'image/png'}]
    }">
    
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --danger: #f44336;
            --warning: #FF9800;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #45a049 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        
        /* Auth Screens */
        .auth-screen { background: white; border-radius: 25px; padding: 40px 30px; margin: 50px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center; }
        .auth-title { font-size: 2.2em; font-weight: 800; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .auth-subtitle { color: #666; margin-bottom: 30px; font-size: 1.1em; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        .input-field {
            width: 100%; padding: 18px 20px 18px 50px; font-size: 16px;
            border: 2px solid #e1e8ed; border-radius: 15px; transition: all 0.3s;
            background: #f8f9fa;
        }
        .input-field:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(76,175,80,0.1); }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #999; }
        
        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
            margin-bottom: 15px;
        }
        .btn-primary { background: linear-gradient(45deg, var(--primary), #45a049); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(76,175,80,0.4); }
        .btn-google { background: #fff; color: #333; border: 2px solid #ddd; font-weight: 600; }
        .btn-google:hover { background: #f8f9fa; }
        
        .divider { text-align: center; margin: 25px 0; color: #999; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e1e8ed; }
        .divider span { background: white; padding: 0 20px; }
        
        /* Dashboard */
        .dashboard { display: none; }
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .confidence-badge { 
            background: linear-gradient(45deg, var(--warning), #FFB300); 
            color: white; padding: 8px 16px; border-radius: 25px; font-weight: 600; font-size: 14px;
        }
        
        .question-card { 
            background: white; padding: 30px 25px; border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); margin-bottom: 25px; text-align: center;
        }
        .question { font-size: 1.4em; font-weight: 700; color: var(--dark); line-height: 1.5; min-height: 90px; display: flex; align-items: center; justify-content: center; }
        .job-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .job-btn { 
            padding: 10px 20px; border: 2px solid #e1e8ed; background: white; 
            border-radius: 25px; cursor: pointer; transition: all 0.3s; font-weight: 600;
        }
        .job-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .score-display { 
            font-size: 4em; font-weight: 900; margin: 20px 0; 
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .confidence-meter { 
            width: 100%; height: 20px; background: #e1e8ed; 
            border-radius: 10px; overflow: hidden; margin: 20px 0;
        }
        .confidence-fill { 
            height: 100%; background: linear-gradient(90deg, #f44336 0%, #FF9800 50%, var(--primary) 100%);
            transition: width 1s ease; border-radius: 10px;
        }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .stat-card { 
            background: rgba(255,255,255,0.9); padding: 25px; border-radius: 20px; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stat-number { font-size: 2.5em; font-weight: 800; color: var(--primary); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 25px; max-width: 400px; width: 90%;
        }
    </style>
</head>
<body>
    <!-- Login/Register Screen -->
    <div id="authScreen" class="auth-screen">
        <h1 class="auth-title">JobCrackAI</h1>
        <p class="auth-subtitle">Crack interviews with AI confidence coach</p>
        
        <div class="input-group">
            <span class="input-icon">👤</span>
            <input type="text" id="username" class="input-field" placeholder="Username / Phone">
        </div>
        <div class="input-group">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="input-field" placeholder="Password">
        </div>
        
        <button class="btn btn-primary" onclick="login()">🚀 Start Practice</button>
        <button class="btn btn-google" onclick="googleLogin()">Sign in with Google</button>
        
        <div class="divider"><span>or</span></div>
        <button class="btn btn-primary" onclick="register()">Create Free Account</button>
        <p style="margin-top: 20px; color: #666; font-size: 14px;">No spam. Practice only.</p>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="container dashboard">
        <div class="header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">JD</div>
                <div>
                    <div id="userName" style="font-weight: 700;">John Doe</div>
                    <div style="font-size: 13px; color: #666;">Driver • Level 3</div>
                </div>
            </div>
            <div class="confidence-badge" id="confidenceBadge">82%</div>
        </div>
        
        <div class="question-card">
            <div class="job-selector" id="jobSelector">
                <div class="job-btn active" data-job="driver">🚗 Driver</div>
                <div class="job-btn" data-job="factory">🏭 Factory</div>
                <div class="job-btn" data-job="security">🛡️ Security</div>
            </div>
            <div id="question" class="question">Select job type to start...</div>
        </div>
        
        <input type="text" id="answer" class="answer-input" placeholder="Type your answer or use speech... 🎤">
        
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-primary" style="flex: 2;" onclick="getFeedback()">✅ Get AI Feedback</button>
            <button class="btn btn-speech" style="flex: 1;" onclick="startSpeech()">🎤 Speak</button>
        </div>
        
        <div id="feedback" style="display: none; margin-top: 25px;"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalPractice">0</div>
                <div>Total Practice</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="streak">0</div>
                <div>Daily Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgConfidence">0%</div>
                <div>Avg Confidence</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="bestScore">0</div>
                <div>Best Score</div>
            </div>
        </div>
    </div>
    
    <!-- Logout Modal -->
    <div id="logoutModal" class="modal">
        <div class="modal-content">
            <h3>Logout?</h3>
            <p>Your progress will be saved.</p>
            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="logout()">Yes</button>
                <button class="btn btn-google" style="flex: 1;" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // User Data (Local Storage)
        let user = JSON.parse(localStorage.getItem('jobcrackai_user')) || null;
        let practiceData = JSON.parse(localStorage.getItem('jobcrackai_data')) || {
            totalPractice: 0, streak: 0, avgConfidence: 0, bestScore: 0,
            driver: [], factory: [], security: []
        };

        // Questions Database
        const questions = {
            driver: [
                "What's your driving experience in years?",
                "How do you handle emergency braking?",
                "What are the key safety rules you follow?",
                "What if you're running late for duty?",
                "Walk me through your vehicle check process",
                "How do you handle traffic signals?",
                "What if you get a tire puncture?",
                "Night driving precautions?",
                "Handling passenger arguments?",
                "Fuel saving techniques?"
            ],
            factory: [
                "Why is safety gear mandatory?",
                "Machine breakdown procedure?",
                "How do you perform quality checks?",
                "Late for shift - what to do?",
                "Team conflict resolution?",
                "Fire safety knowledge?",
                "Machine operation steps?",
                "Production target miss?",
                "Training new workers?",
                "Reporting to supervisor?"
            ],
            security: [
                "Patrolling procedure?",
                "Theft detection protocol?",
                "Guest ID verification?",
                "Emergency contact procedure?",
                "CCTV monitoring best practices?",
                "Night duty preparation?",
                "Vehicle inspection process?",
                "Fire alarm response?",
                "VIP arrival protocol?",
                "Daily reporting format?"
            ]
        };

        let currentJob = 'driver';
        let currentQuestion = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', initApp);

        function initApp() {
            if (user) {
                showDashboard();
                loadUserData();
            } else {
                showAuth();
            }
            setupEventListeners();
        }

        function setupEventListeners() {
            // Job selector
            document.querySelectorAll('.job-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelector('.job-btn.active').classList.remove('active');
                    e.target.classList.add('active');
                    currentJob = e.target.dataset.job;
                    loadQuestions();
                    newQuestion();
                });
            });
        }

        function showAuth() { document.getElementById('authScreen').style.display = 'block'; }
        function showDashboard() { 
            document.getElementById('authScreen').style.display = 'none'; 
            document.getElementById('dashboard').style.display = 'block'; 
        }

        function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) return alert('Please fill all fields');
            
            user = {
                id: Date.now().toString(),
                username: username,
                confidence: Math.floor(Math.random() * 20) + 70, // 70-90%
                joined: new Date().toISOString(),
                level: 1
            };
            
            localStorage.setItem('jobcrackai_user', JSON.stringify(user));
            localStorage.setItem('jobcrackai_data', JSON.stringify(practiceData));
            
            showDashboard();
            loadUserData();
            alert(`Welcome ${username}! Your confidence journey starts now! 🚀`);
        }

        function login() {
            const savedUser = JSON.parse(localStorage.getItem('jobcrackai_user'));
            if (!savedUser) return register();
            
            showDashboard();
            loadUserData();
        }

        function googleLogin() {
            // Simulate Google OAuth
            user = {
                id: 'google_' + Date.now(),
                username: 'Google User',
                confidence: 85,
                joined: new Date().toISOString(),
                level: 2,
                avatar: 'G'
            };
            localStorage.setItem('jobcrackai_user', JSON.stringify(user));
            showDashboard();
            loadUserData();
        }

        function loadUserData() {
            document.getElementById('userName').textContent = user.username;
            document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();
            document.getElementById('confidenceBadge').textContent = user.confidence + '%';
            
            updateStats();
        }

        function loadQuestions() {
            questions[currentJob] = questions[currentJob] || questions.driver;
        }

        function newQuestion() {
            const qList = questions[currentJob];
            currentQuestion = qList[Math.floor(Math.random() * qList.length)];
            document.getElementById('question').textContent = currentQuestion;
            document.getElementById('answer').value = '';
            document.getElementById('feedback').style.display = 'none';
        }

        function getFeedback() {
            const answer = document.getElementById('answer').value.trim();
            if (!answer) return alert('Please enter your answer first!');

            practiceData.totalPractice++;
            
            // Advanced Confidence AI
            const score = calculateAIScore(answer, currentQuestion);
            const confidenceBoost = Math.min(5, score / 20); // Max 5% boost per session
            user.confidence = Math.min(99, user.confidence + confidenceBoost);
            
            practiceData.driver.push(score); // Track all scores
            
            // Save Progress
            localStorage.setItem('jobcrackai_user', JSON.stringify(user));
            localStorage.setItem('jobcrackai_data', JSON.stringify(practiceData));
            
            showFeedback(score, answer);
            updateStats();
        }

        function calculateAIScore(answer, question) {
            let score = 50; // Base
            
            // Length & Completeness
            score += Math.min(answer.length * 1.5, 20);
            
            // Relevance Keywords
            const relevantWords = ['safety', 'check', 'procedure', 'process', 'follow', 'report', 'emergency'];
            const answerWords = answer.toLowerCase().split(' ');
            relevantWords.forEach(word => {
                if (answerWords.some(w => w.includes(word))) score += 8;
            });
            
            // Confidence Indicators
            const confidentWords = ['always', 'never', 'definitely', 'ensure', 'make sure'];
            confidentWords.forEach(word => {
                if (answerWords.some(w => w.includes(word))) score += 5;
            });
            
            // Structure (sentences)
            score += Math.min(answer.split(/[.!?]/).length * 5, 15);
            
            return Math.min(100, Math.floor(score + (Math.random() * 8)));
        }

        function showFeedback(score, answer) {
            const feedbackEl = document.getElementById('feedback');
            const scoreClass = score >= 90 ? 'excellent' : score >= 75 ? 'good' : 'needs-work';
            const tips = {
                excellent: "Outstanding! Interview panel will love this confidence! 🎉",
                good: "Strong answer! Add one more specific example next time.",
                'needs-work': "Good start! Speak slower and add safety examples."
            };
            
            feedbackEl.innerHTML = `
                <div class="score-display ${scoreClass}">${score}</div>
                <div style="font-size: 1.3em; margin-bottom: 15px; color: var(--dark);">Confidence Boost: +${Math.floor(Math.min(5, score/20))}%</div>
                <div class="confidence-meter">
                    <div class="confidence-fill" style="width: ${user.confidence}%"></div>
                </div>
                <div style="font-size: 1.1em; color: #555; margin-top: 15px;">${tips[scoreClass]}</div>
            `;
            feedbackEl.style.display = 'block';
            
            // Auto next question
            setTimeout(newQuestion, 4000);
        }

        function updateStats() {
            document.getElementById('totalPractice').textContent = practiceData.totalPractice;
            document.getElementById('streak').textContent = practiceData.streak;
            document.getElementById('avgConfidence').textContent = Math.round(user.confidence) + '%';
            document.getElementById('bestScore').textContent = Math.max(...practiceData.driver) || 0;
            document.getElementById('confidenceBadge').textContent = Math.round(user.confidence) + '%';
        }

        function startSpeech() {
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'en-US';
                recognition.onresult = (event) => {
                    document.getElementById('answer').value = event.results[0][0].transcript;
                };
                recognition.start();
            } else {
                alert('Speech recognition not supported. Type your answer!');
            }
        }

        function logout() {
            localStorage.removeItem('jobcrackai_user');
            localStorage.removeItem('jobcrackai_data');
            location.reload();
        }

        function closeModal() {
            document.getElementById('logoutModal').style.display = 'none';
        }
    </script>
</body>
</html>
