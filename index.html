<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCrackAI - Live AI Video Interview 🇮🇳</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.2/dist/face-landmarks-detection.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.25); }
        .ai-avatar { 
            width: 120px; height: 120px; 
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; box-shadow: 0 20px 40px rgba(139,92,246,0.4);
        }
        @keyframes speak { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
        .speaking { animation: speak 1.5s infinite; }
        .blink { animation: blink 3s infinite; }
        @keyframes blink { 0%,90%{opacity:1;} 95%{opacity:0;} }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-pink-900 min-h-screen">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Global AI Model Refs
        let faceMesh = null;
        let model = null;
        let camera = null;

        function App() {
            const [page, setPage] = useState('home');
            const [interviewActive, setInterviewActive] = useState(false);
            const [aiSpeaking, setAiSpeaking] = useState(false);
            const [userSpeaking, setUserSpeaking] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState('');
            const [metrics, setMetrics] = useState({
                eyeContact: 0,
                confidence: 0,
                speechClarity: 0,
                posture: 0,
                nervousness: 100
            });
            const [aiQuestions, setAiQuestions] = useState([]);
            const [questionHistory, setQuestionHistory] = useState([]);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const aiVoiceRef = useRef(null);

            // Hindi Job Questions
            const jobQuestions = {
                driver: [
                    "भाई, आपका driving experience कितना है?",
                    "Road पर emergency हो तो क्या करोगे?",
                    "Vehicle daily check कैसे करते हो?",
                    "Customer complaint आए तो?",
                    "Traffic rules सब याद हैं?"
                ],
                factory: [
                    "Shift perfect attend करते हो?",
                    "Machine breakdown हो तो?",
                    "Quality check कैसे करते हो?",
                    "Target miss हो जाए तो?",
                    "Safety gear हमेशा पहनते हो?"
                ],
                security: [
                    "Patrol duty कैसे करते हो?",
                    "Suspicious person देखा तो?",
                    "VIP आने पर protocol क्या?",
                    "CCTV monitoring कैसे?",
                    "Emergency evacuation plan?"
                ]
            };

            // Initialize AI Face Detection
            const initFaceMesh = async () => {
                const faceMeshModel = await window.FaceMesh.createFromOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                faceMesh = faceMeshModel;
            };

            // Real Eye Contact Detection
            const detectEyeContact = (landmarks) => {
                if (!landmarks || landmarks.length === 0) return 0;
                
                const leftEye = landmarks[33]; // Left eye center
                const rightEye = landmarks[362]; // Right eye center
                const noseTip = landmarks[1]; // Nose tip
                
                // Calculate eye direction (gaze estimation)
                const eyeCenterX = (leftEye[0] + rightEye[0]) / 2;
                const cameraCenterX = 0.5;
                
                const gazeOffset = Math.abs(eyeCenterX - cameraCenterX);
                const eyeContactScore = Math.max(0, 100 - (gazeOffset * 200));
                
                return Math.round(eyeContactScore);
            };

            // Speech Analysis from Microphone
            const initAudioAnalysis = () => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 256;
                    const bufferLength = analyserRef.current.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    
                    source.connect(analyserRef.current);
                    
                    const detectSpeech = () => {
                        analyserRef.current.getByteFrequencyData(dataArray);
                        const average = dataArray.reduce((a, b) => a + b) / bufferLength;
                        const volume = average / 255;
                        
                        setUserSpeaking(volume > 0.15); // Speech threshold
                        const clarity = Math.min(100, volume * 200);
                        setMetrics(m => ({ ...m, speechClarity: Math.round(clarity) }));
                        
                        requestAnimationFrame(detectSpeech);
                    };
                    detectSpeech();
                });
            };

            // AI Speaking with Web Speech Synthesis
            const speakQuestion = (question, jobType) => {
                setAiSpeaking(true);
                const utterance = new SpeechSynthesisUtterance(question);
                utterance.lang = 'hi-IN';
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                utterance.volume = 0.8;
                
                utterance.onstart = () => {
                    setCurrentQuestion(question);
                    aiVoiceRef.current = utterance;
                };
                
                utterance.onend = () => {
                    setAiSpeaking(false);
                    aiVoiceRef.current = null;
                    // Auto next question after 3s
                    setTimeout(() => nextQuestion(jobType), 3000);
                };
                
                speechSynthesis.speak(utterance);
            };

            // Next AI Question
            const nextQuestion = (jobType = 'driver') => {
                const questions = jobQuestions[jobType] || jobQuestions.driver;
                const randomQ = questions[Math.floor(Math.random() * questions.length)];
                speakQuestion(randomQ, jobType);
                
                setQuestionHistory(prev => [...prev.slice(-4), randomQ]);
                setAiQuestions(prev => [...prev.slice(-2), randomQ]);
            };

            // Start Live AI Interview
            const startLiveInterview = async (jobType = 'driver') => {
                try {
                    // Camera + Face Detection
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: 640, height: 480, facingMode: 'user' }
                    });
                    
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        videoRef.current.play();
                    }
                    
                    // Initialize AI
                    await initFaceMesh();
                    initAudioAnalysis();
                    
                    setInterviewActive(true);
                    nextQuestion(jobType);
                    
                } catch (err) {
                    alert('📱 Camera + Mic Permission दो!\nSettings → Privacy → Camera/Mic ON करो');
                }
            };

            // Live Face Analysis Loop
            useEffect(() => {
                let animationId;
                
                const analyzeFace = async () => {
                    if (!faceMesh || !videoRef.current?.videoWidth) {
                        animationId = requestAnimationFrame(analyzeFace);
                        return;
                    }
                    
                    const video = videoRef.current;
                    const predictions = await faceMesh.estimateFaces(video);
                    
                    if (predictions.length > 0) {
                        const eyeContactScore = detectEyeContact(predictions[0].scaledMesh);
                        
                        // Posture analysis (head tilt)
                        const noseTip = predictions[0].scaledMesh[1];
                        const chin = predictions[0].scaledMesh[152];
                        const headTilt = Math.abs(noseTip[1] - chin[1]);
                        const postureScore = Math.max(0, 100 - (headTilt * 2));
                        
                        // Nervousness (blink rate + head movement)
                        const nervousness = 100 - eyeContactScore * 0.6 - postureScore * 0.4;
                        
                        setMetrics({
                            eyeContact: Math.round(eyeContactScore),
                            posture: Math.round(postureScore),
                            nervousness: Math.round(Math.max(0, nervousness)),
                            confidence: Math.round((eyeContactScore * 0.5 + postureScore * 0.3 + metrics.speechClarity * 0.2)),
                        });
                    }
                    
                    animationId = requestAnimationFrame(analyzeFace);
                };
                
                if (interviewActive) {
                    animationId = requestAnimationFrame(analyzeFace);
                }
                
                return () => cancelAnimationFrame(animationId);
            }, [interviewActive, metrics.speechClarity]);

            const stopInterview = () => {
                if (videoRef.current?.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
                if (aiVoiceRef.current) {
                    speechSynthesis.cancel();
                }
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
                setInterviewActive(false);
                setAiSpeaking(false);
                setUserSpeaking(false);
                setMetrics({ eyeContact: 0, confidence: 0, speechClarity: 0, posture: 0, nervousness: 100 });
            };

            const HomePage = () => (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-8">
                    <div className="ai-avatar mb-8 shadow-2xl">
                        <span className="blink">🤖</span>
                    </div>
                    
                    <div>
                        <h1 className="text-4xl md:text-6xl font-black bg-gradient-to-r from-white to-purple-200 bg-clip-text text-transparent mb-6">
                            Live AI Interview
                        </h1>
                        <p className="text-xl md:text-2xl text-purple-100 mb-8 max-w-2xl mx-auto leading-relaxed">
                            Camera से Eye Contact check करेगा।<br/>
                            Live Voice Analysis + Real Questions!
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl w-full mb-12">
                        {[
                            { job: 'driver', emoji: '🚗', title: 'ड्राइवर भर्ती' },
                            { job: 'factory', emoji: '🏭', title: 'फैक्टरी वर्कर' },
                            { job: 'security', emoji: '🛡️', title: 'सिक्योरिटी गार्ड' }
                        ].map(({ job, emoji, title }) => (
                            <div key={job} className="glass p-8 rounded-3xl hover:scale-105 transition-all cursor-pointer shadow-2xl border-4 border-transparent hover:border-purple-400"
                                onClick={() => startLiveInterview(job)}>
                                <div className="text-5xl mb-6 mx-auto">{emoji}</div>
                                <h3 className="text-2xl font-bold text-white mb-4">{title}</h3>
                                <div className="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-8 py-3 rounded-2xl font-bold inline-block hover:scale-110">
                                    अभी शुरू करो
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="glass p-6 rounded-3xl max-w-md w-full shadow-2xl">
                        <h3 className="text-xl font-bold mb-4">AI क्या Check करेगा?</h3>
                        <div className="grid grid-cols-2 gap-4 text-sm">
                            <div className="flex items-center space-x-2"><span className="text-lg">👁️</span><span>Eye Contact</span></div>
                            <div className="flex items-center space-x-2"><span className="text-lg">🎤</span><span>Speech Clarity</span></div>
                            <div className="flex items-center space-x-2"><span className="text-lg">🧍</span><span>Posture</span></div>
                            <div className="flex items-center space-x-2"><span className="text-lg">😊</span><span>Confidence</span></div>
                        </div>
                    </div>
                </div>
            );

            const InterviewPage = () => (
                <div className="min-h-screen p-6 relative">
                    {/* Top Bar */}
                    <div className="glass p-4 rounded-3xl mb-6 flex items-center justify-between">
                        <button onClick={stopInterview} className="text-2xl hover:scale-110">🏠</button>
                        <div className="flex items-center space-x-4">
                            <div className={`w-3 h-3 rounded-full ${userSpeaking ? 'bg-green-400 animate-pulse' : 'bg-gray-500'}`}></div>
                            <div className={`w-3 h-3 rounded-full ${aiSpeaking ? 'bg-purple-400 speaking' : 'bg-gray-500'}`}></div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        {/* User Video + Analysis */}
                        <div className="space-y-4">
                            <div className="glass rounded-3xl p-4 relative">
                                <video ref={videoRef} autoPlay muted playsInline 
                                    className="w-full h-80 lg:h-96 rounded-2xl object-cover shadow-2xl" />
                                <canvas ref={canvasRef} className="absolute inset-0 w-full h-full rounded-2xl pointer-events-none" />
                            </div>
                            
                            {/* Live Metrics */}
                            <div className="grid grid-cols-2 gap-4">
                                {Object.entries(metrics).map(([key, value]) => {
                                    const color = value > 75 ? 'from-green-500 to-emerald-500' : 
                                                 value > 50 ? 'from-yellow-500 to-orange-500' : 'from-red-500 to-pink-500';
                                    return (
                                        <div key={key} className={`glass p-4 rounded-2xl text-center shadow-xl ${color}`}>
                                            <div className="text-2xl font-black">{Math.round(value)}%</div>
                                            <div className="text-xs capitalize">{key.replace('_', ' ')}</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* AI Avatar + Chat */}
                        <div className="space-y-6">
                            <div className={`ai-avatar mx-auto shadow-2xl ${aiSpeaking ? 'speaking' : ''}`}>
                                <span className="text-4xl">🤖</span>
                            </div>
                            
                            {/* Current Question */}
                            {currentQuestion && (
                                <div className="glass p-6 rounded-3xl shadow-2xl bg-gradient-to-r from-purple-500/20 to-pink-500/20 border-2 border-purple-400/50">
                                    <div className="text-2xl font-bold text-white mb-4">🎤 AI पूछ रहा है:</div>
                                    <div className="text-xl leading-relaxed bg-white/10 p-4 rounded-2xl backdrop-blur-sm">
                                        "{currentQuestion}"
                                    </div>
                                </div>
                            )}
                            
                            {/* Question History */}
                            <div className="glass p-4 rounded-2xl max-h-64 overflow-y-auto space-y-2">
                                <div className="text-sm font-bold text-purple-300 mb-3">पिछले सवाल:</div>
                                {questionHistory.map((q, i) => (
                                    <div key={i} className="text-sm bg-white/10 p-3 rounded-xl backdrop-blur-sm">
                                        {q}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Control Buttons */}
                    <div className="glass p-6 rounded-3xl flex gap-4 justify-center">
                        <button onClick={stopInterview}
                            className="flex-1 bg-gradient-to-r from-red-500 to-pink-500 text-white py-4 px-6 rounded-2xl font-bold text-lg shadow-2xl hover:scale-105">
                            🛑 Interview समाप्त करें
                        </button>
                        <button onClick={() => nextQuestion('driver')}
                            className="glass p-4 rounded-2xl text-2xl shadow-xl hover:scale-110"
                            title="अगला सवाल">
                            ➡️
                        </button>
                    </div>
                </div>
            );

            return interviewActive ? <InterviewPage /> : <HomePage />;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
