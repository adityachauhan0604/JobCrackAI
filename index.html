<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Same head as before -->
    <title>JobCrackAI - Unlimited Video Practice 🇮🇳</title>
</head>
<body>
    <!-- Same menu structure -->
    
    <script>
        // UNLIMITED QUESTION CATEGORIES
        const QUESTION_CATEGORIES = {
            beginner: {
                driver: ["basic intro", "experience", "daily routine", "safety rules"],
                factory: ["shift timing", "machine basics", "team work", "reporting"],
                security: ["patrol route", "ID check", "visitor log", "shift handover"]
            },
            intermediate: {
                driver: ["emergency handling", "customer complaint", "traffic violation"],
                factory: ["machine breakdown", "quality issue", "target miss"],
                security: ["suspicious activity", "VIP protocol", "CCTV alert"]
            },
            expert: {
                driver: ["salary negotiation", "previous job reason", "career goal"],
                factory: ["union problem", "production delay", "supervisor conflict"],
                security: ["theft investigation", "emergency evacuation", "policy violation"]
            }
        };

        // Generate Unlimited Questions
        function generateQuestion(level, category) {
            const templates = QUESTION_CATEGORIES[level][category];
            const template = templates[Math.floor(Math.random() * templates.length)];
            const variations = [
                `Boss se "${template}" ke baare mein poochha jaaye to kya jawab doge?`,
                `Real situation: "${template}". Aap kya karoge? Explain.`,
                `Interview mein ye sawaal aaya: "${template}". 1 minute jawab do.`,
                `Practical example do: "${template}" handle karne ka.`
            ];
            return variations[Math.floor(Math.random() * variations.length)];
        }
    </script>
</body>
</html>
