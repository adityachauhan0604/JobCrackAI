<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCrackAI - Beginner Interview Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.2); 
        }
        .premium-badge {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            box-shadow: 0 4px 14px rgba(255,215,0,0.4);
        }
        @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        .float { animation: float 3s ease-in-out infinite; }
        .metric-inactive { opacity: 0.4; }
        .metric-active { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 min-h-screen p-4 text-white">

    <div class="max-w-2xl mx-auto space-y-8">
        
        <!-- Premium Header -->
        <div class="glass p-8 rounded-3xl text-center shadow-2xl float">
            <div class="premium-badge px-6 py-3 rounded-2xl inline-block font-bold text-black mb-6 shadow-lg">
                ⭐ PREMIUM UNLOCKED - UNLIMITED ⭐
            </div>
            <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-r from-white to-blue-300 bg-clip-text text-transparent mb-4">
                JobCrackAI
            </h1>
            <div class="text-2xl font-semibold text-blue-200 mb-6">Beginner Level - Unlimited Practice</div>
            
            <!-- Level Navigation -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="intermediate.html" class="glass px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all text-center">
                    ⚡ Intermediate Level
                </a>
                <a href="expert.html" class="glass px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all text-center">
                    👑 Expert Level
                </a>
            </div>
        </div>

        <!-- Job + Practice Type Selection -->
        <div class="glass p-6 rounded-3xl shadow-2xl">
            <div class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8">
                <button onclick="selectJob('driver')" class="job-btn p-4 rounded-2xl font-bold transition-all hover:scale-105 ${currentJob === 'driver' ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg' : 'glass'}">
                    🚗 Driver
                </button>
                <button onclick="selectJob('factory')" class="job-btn p-4 rounded-2xl font-bold transition-all hover:scale-105 ${currentJob === 'factory' ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg' : 'glass'}">
                    🏭 Factory
                </button>
                <button onclick="selectJob('security')" class="job-btn p-4 rounded-2xl font-bold transition-all hover:scale-105 ${currentJob === 'security' ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg' : 'glass'}">
                    🛡️ Security
                </button>
                <button onclick="selectPractice('video')" class="practice-btn p-4 rounded-2xl font-bold transition-all hover:scale-105 ${practiceType === 'video' ? 'bg-gradient-to-r from-green-500 to-emerald-600 text-white shadow-lg' : 'glass'}">
                    📹 Video Call
                </button>
                <button onclick="selectPractice('written')" class="practice-btn p-4 rounded-2xl font-bold transition-all hover:scale-105 ${practiceType === 'written' ? 'bg-gradient-to-r from-green-500 to-emerald-600 text-white shadow-lg' : 'glass'}">
                    ✍️ Written
                </button>
            </div>
        </div>

        <!-- Video/Written Practice Area -->
        <div id="practiceArea" class="glass p-8 rounded-3xl shadow-2xl min-h-[400px] flex flex-col justify-center items-center text-center">
            <div class="text-3xl mb-4">👆 Select Job + Practice Type</div>
            <div class="text-xl text-blue-300">Click VIDEO CALL or WRITTEN practice to start!</div>
        </div>

        <!-- Live Metrics (Start at 0%) -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass p-8 rounded-3xl text-center shadow-xl metric-inactive" id="eyeMetric">
                <div id="eyeContact" class="text-4xl font-black text-gray-400 mb-2">0%</div>
                <div class="text-blue-200 font-semibold">Eye Contact</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center shadow-xl metric-inactive" id="confMetric">
                <div id="confidence" class="text-4xl font-black text-gray-400 mb-2">0%</div>
                <div class="text-blue-200 font-semibold">Confidence</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center shadow-xl metric-inactive" id="speechMetric">
                <div id="speech" class="text-4xl font-black text-gray-400 mb-2">0%</div>
                <div class="text-blue-200 font-semibold">Speech Clarity</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center shadow-xl metric-inactive" id="postureMetric">
                <div id="posture" class="text-4xl font-black text-gray-400 mb-2">0%</div>
                <div class="text-blue-200 font-semibold">Posture</div>
            </div>
        </div>

        <!-- Question History -->
        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-gradient-to-r from-yellow-400 to-orange-400 rounded-2xl flex items-center justify-center text-2xl font-bold">📜</div>
                <div>
                    <h3 class="text-2xl font-bold">Unlimited Questions</h3>
                    <div class="text-blue-300">Q<span id="questionCount">0</span> of ∞</div>
                </div>
            </div>
            <div id="historyList" class="space-y-3 max-h-64 overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script>
        // Global State
        let videoStream = null;
        let currentJob = 'driver';
        let practiceType = 'video';
        let questionCount = 0;
        let isActive = false;
        let analysisInterval;
        let audioContext, analyser;

        // BEGINNER QUESTIONS - UNLIMITED
        const BEGINNER_QUESTIONS = {
            driver: [
                '"Tell me about your driving experience?"',
                '"What are the basic road safety rules?"',
                '"What is your daily vehicle checklist?"',
                '"How do you handle heavy traffic?"',
                '"Why should we hire you as a driver?"',
                '"What documents do you have for driving?"',
                '"How do you maintain vehicle cleanliness?"',
                '"Experience with different vehicle types?"',
                '"How do you check tire pressure?"',
                '"What to do in case of a flat tire?"'
            ],
            factory: [
                '"What shifts are you available for?"',
                '"What are basic machine safety rules?"',
                '"How do you check product quality?"',
                '"What if you miss your daily target?"',
                '"Tell me about your teamwork experience?"',
                '"How do you handle repetitive work?"',
                '"What safety gear do you use?"',
                '"Experience with assembly line?"',
                '"How do you report machine issues?"',
                '"What is 5S methodology?"'
            ],
            security: [
                '"How do you perform patrol duty?"',
                '"What is the ID checking procedure?"',
                '"How do you handle visitors?"',
                '"What if you see suspicious activity?"',
                '"What is your emergency response?"',
                '"How do you report incidents?"',
                '"What security equipment do you use?"',
                '"Experience with CCTV monitoring?"',
                '"How do you handle gate duty?"',
                '"What is access control?"'
            ]
        };

        // Select Job
        function selectJob(job) {
            currentJob = job;
            document.querySelectorAll('.job-btn').forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-blue-500', 'to-blue-600', 'text-white', 'shadow-lg');
                btn.classList.add('glass');
            });
            event.target.classList.remove('glass');
            event.target.classList.add('bg-gradient-to-r', 'from-blue-500', 'to-blue-600', 'text-white', 'shadow-lg');
            updatePracticeArea();
        }

        // Select Practice Type
        function selectPractice(type) {
            practiceType = type;
            document.querySelectorAll('.practice-btn').forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-green-500', 'to-emerald-600', 'text-white', 'shadow-lg');
                btn.classList.add('glass');
            });
            event.target.classList.remove('glass');
            event.target.classList.add('bg-gradient-to-r', 'from-green-500', 'to-emerald-600', 'text-white', 'shadow-lg');
            updatePracticeArea();
        }

        // Update Practice Area
        function updatePracticeArea() {
            const area = document.getElementById('practiceArea');
            if (practiceType === 'video') {
                area.innerHTML = `
                    <video id="userVideo" autoplay muted playsinline class="w-full max-w-md h-72 rounded-3xl object-cover shadow-2xl mb-6 hidden"></video>
                    <div id="currentQuestion" class="bg-gradient-to-r from-purple-500/20 to-pink-500/20 border-4 border-purple-400/50 p-8 rounded-3xl text-center shadow-2xl mb-8 min-h-[120px] flex flex-col justify-center">
                        <div class="text-3xl font-black text-white mb-4">📹 VIDEO CALL READY</div>
                        <div class="text-xl text-blue-300">Click START VIDEO CALL</div>
                    </div>
                    <button onclick="startPractice()" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white py-5 px-12 rounded-3xl font-black text-xl shadow-2xl hover:scale-105">
                        🎥 START VIDEO CALL
                    </button>
                `;
            } else {
                area.innerHTML = `
                    <div id="writtenQuestion" class="bg-gradient-to-r from-purple-500/20 to-pink-500/20 border-4 border-purple-400/50 p-8 rounded-3xl text-center shadow-2xl mb-8 min-h-[160px] flex flex-col justify-center">
                        <div class="text-3xl font-black text-white mb-6">✍️ WRITTEN PRACTICE</div>
                        <div class="text-2xl bg-white/20 p-6 rounded-2xl backdrop-blur-sm" id="writtenContent">
                            Select Job Type First
                        </div>
                    </div>
                    <div class="flex gap-4 w-full">
                        <button onclick="nextQuestion()" class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 text-white py-5 px-6 rounded-2xl font-bold text-lg shadow-2xl hover:scale-105">
                            ➡️ Next Question
                        </button>
                        <button onclick="showAnswer()" class="flex-1 glass py-5 px-6 rounded-2xl font-bold text-lg shadow-xl hover:scale-105">
                            💡 Show Answer
                        </button>
                    </div>
                `;
                if (currentJob !== 'driver') nextQuestion();
            }
        }

        // Start Video Practice
        async function startPractice() {
            if (practiceType !== 'video') return;
            
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' },
                    audio: true
                });
                
                const video = document.getElementById('userVideo');
                video.srcObject = videoStream;
                video.classList.remove('hidden');
                
                isActive = true;
                initAudioAnalysis();
                nextQuestion();
                activateMetrics();
                
            } catch(err) {
                alert('Camera & Microphone permission required!');
            }
        }

        // Audio Analysis for Speech
        async function initAudioAnalysis() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            
            analyzeSpeech();
        }

        // Real Speech Analysis
        function analyzeSpeech() {
            if (!analyser) return;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            function draw() {
                if (!isActive) return;
                
                analyser.getByteFrequencyData(dataArray);
                const average = dataArray.reduce((a, b) => a + b) / bufferLength;
                const speechLevel = Math.min(95, (average / 255) * 100);
                
                document.getElementById('speech').textContent = Math.round(speechLevel) + '%';
                requestAnimationFrame(draw);
            }
            draw();
        }

        // Next Unlimited Question
        function nextQuestion() {
            questionCount++;
            document.getElementById('questionCount').textContent = questionCount;
            
            const questions = BEGINNER_QUESTIONS[currentJob];
            const randomQuestion = questions[Math.floor(Math.random() * questions.length)];
            
            if (practiceType === 'video') {
                document.getElementById('currentQuestion').innerHTML = `
                    <div class="text-3xl font-black text-white mb-6">Q${questionCount}</div>
                    <div class="text-2xl bg-white/20 p-6 rounded-2xl backdrop-blur-sm">${randomQuestion}</div>
                `;
            } else {
                document.getElementById('writtenContent').textContent = randomQuestion;
            }
            
            addToHistory(randomQuestion);
        }

        // Written Answer (Simple Tips)
        function showAnswer() {
            const answers = {
                driver: "Answer: 'I have 2 years experience, clean license, daily vehicle checks, safety first approach'",
                factory: "Answer: 'Available all shifts, follow safety rules, quality checks every hour, team player'",
                security: "Answer: 'Regular patrols, proper ID checks, report suspicious activity immediately'"
            };
            const answer = answers[currentJob] || "Practice confident answer in 30-60 seconds";
            document.getElementById('writtenContent').innerHTML = `<div class="text-green-400 font-bold text-xl">${answer}</div>`;
        }

        // Add to History
        function addToHistory(question) {
            const history = document.getElementById('historyList');
            const div = document.createElement('div');
            div.className = 'p-4 bg-white/10 rounded-2xl backdrop-blur-sm hover:bg-white/20 transition-all';
            div.innerHTML = `<strong>Q${questionCount}:</strong> ${question}`;
            history.insertBefore(div, history.firstChild);
            
            // Keep only last 10
            while (history.children.length > 10) {
                history.removeChild(history.lastChild);
            }
        }

        // Activate Metrics (0% → Real Analysis)
        function activateMetrics() {
            document.querySelectorAll('.metric-inactive').forEach(metric => {
                metric.classList.remove('metric-inactive');
                metric.classList.add('metric-active');
            });
            
            // Simulate real analysis
            analysisInterval = setInterval(() => {
                if (!isActive) return;
                
                // Eye contact (random realistic)
                const eye = Math.max(30, 75 + (Math.random() - 0.5) * 30);
                document.getElementById('eyeContact').textContent = Math.round(eye) + '%';
                
                // Confidence (average of all)
                const conf = Math.round((parseInt(document.getElementById('eyeContact').textContent) + 
                                       parseInt(document.getElementById('speech').textContent) + 
                                       parseInt(document.getElementById('posture').textContent)) / 3);
                document.getElementById('confidence').textContent = conf + '%';
                
                // Posture (random)
                const posture = Math.max(40, 70 + (Math.random() - 0.5) * 25);
                document.getElementById('posture').textContent = Math.round(posture) + '%';
            }, 3000);
        }

        // Stop Everything
        window.onbeforeunload = () => {
            if (videoStream) videoStream.getTracks().forEach(track => track.stop());
            if (audioContext) audioContext.close();
        };
    </script>
</body>
</html>
